<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Knife Master</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #111; overflow: hidden; font-family: Arial, sans-serif; cursor: pointer; user-select: none; }
#wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; gap: 6px; }
#score-display { font-size: 1.6em; font-weight: bold; color: #f59e0b; text-align: center; }
#level-display { font-size: 0.85em; color: #9ca3af; text-align: center; }
#knives-display { font-size: 0.9em; color: #e5e7eb; text-align: center; letter-spacing: 3px; min-height: 20px; }
#canvas { display: block; }
#msg { color: #e5e7eb; text-align: center; font-size: 0.9em; min-height: 20px; }
#restart-btn { display: none; background: #dc2626; color: #fff; border: none; padding: 8px 24px; border-radius: 8px; font-size: 1em; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
<div id="wrapper">
  <div>
    <div id="score-display">SCORE: 0</div>
    <div id="level-display">LEVEL 1</div>
    <div id="knives-display">| | | | |</div>
  </div>
  <canvas id="canvas"></canvas>
  <div id="msg">CLICK ANYWHERE TO THROW</div>
  <button id="restart-btn">PLAY AGAIN</button>
</div>
<script>
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var score = 0, level = 1, knivesLeft = 5, speed = 0.02;
var angle = 0, stuckKnives = [], phase = 'playing';
var flyingKnife = null;

function resize() {
  var uiH = 120;
  var maxW = Math.min(window.innerWidth - 16, 400);
  var maxH = Math.min(window.innerHeight - uiH - 16, 460);
  var size = Math.min(maxW, maxH);
  canvas.width = size; canvas.height = size;
}
resize();
window.addEventListener('resize', resize);

function getCX() { return canvas.width / 2; }
function getCY() { return canvas.height * 0.42; }
function getR()  { return canvas.width * 0.22; }
function getKL() { return canvas.width * 0.13; }
function getKnifeY() { return canvas.height * 0.86; }

function initLevel() {
  stuckKnives = []; flyingKnife = null;
  knivesLeft = Math.min(5 + Math.floor(level / 2), 9);
  speed = (0.02 + level * 0.003) * (level % 4 === 0 ? -1 : 1);
  phase = 'playing';
  updateUI();
  document.getElementById('msg').textContent = 'CLICK ANYWHERE TO THROW';
  document.getElementById('restart-btn').style.display = 'none';
}

function updateUI() {
  document.getElementById('score-display').textContent = 'SCORE: ' + score;
  document.getElementById('level-display').textContent = 'LEVEL ' + level;
  var s = '';
  for (var i = 0; i < Math.max(knivesLeft, 0); i++) s += '| ';
  document.getElementById('knives-display').textContent = s.trim() || '-';
}

function drawLog() {
  var c = getCX(), y = getCY(), r = getR();
  var grad = ctx.createRadialGradient(c-r*0.2, y-r*0.2, r*0.05, c, y, r);
  grad.addColorStop(0, '#c8956a'); grad.addColorStop(0.5, '#a0714f'); grad.addColorStop(1, '#7a5230');
  ctx.beginPath(); ctx.arc(c, y, r, 0, Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();
  for (var rr = r*0.18; rr < r; rr += r*0.18) {
    ctx.beginPath(); ctx.arc(c, y, rr, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1.2; ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(c, y, r*0.07, 0, Math.PI*2);
  ctx.fillStyle = '#5a3520'; ctx.fill();
  ctx.beginPath(); ctx.arc(c, y, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 2.5; ctx.stroke();
}

function drawSingleKnife(kx, ky, kangle) {
  var kl = getKL(), bw = canvas.width * 0.022;
  ctx.save(); ctx.translate(kx, ky); ctx.rotate(kangle);
  ctx.beginPath();
  ctx.moveTo(0, -kl); ctx.lineTo(bw*0.4, -kl*0.3); ctx.lineTo(bw*0.4, 0);
  ctx.lineTo(-bw*0.4, 0); ctx.lineTo(-bw*0.15, -kl*0.3); ctx.closePath();
  var bg = ctx.createLinearGradient(-bw*0.4, 0, bw*0.4, 0);
  bg.addColorStop(0, '#c0c0c0'); bg.addColorStop(0.4, '#f0f0f0'); bg.addColorStop(1, '#a0a0a0');
  ctx.fillStyle = bg; ctx.fill(); ctx.strokeStyle = '#888'; ctx.lineWidth = 0.5; ctx.stroke();
  var hw = canvas.width*0.014;
  ctx.fillStyle = '#c0392b'; ctx.fillRect(-bw*0.7, 0, bw*1.4, hw);
  ctx.beginPath();
  ctx.moveTo(-bw*0.5, hw); ctx.lineTo(bw*0.5, hw); ctx.lineTo(bw*0.4, hw+kl*0.42);
  ctx.lineTo(-bw*0.4, hw+kl*0.42); ctx.closePath();
  var hg = ctx.createLinearGradient(-bw*0.5,0,bw*0.5,0);
  hg.addColorStop(0,'#8B4513'); hg.addColorStop(0.5,'#A0522D'); hg.addColorStop(1,'#6B3410');
  ctx.fillStyle = hg; ctx.fill();
  ctx.restore();
}

function drawStuck() {
  for (var i = 0; i < stuckKnives.length; i++) {
    var a = stuckKnives[i].logAngle + angle;
    drawSingleKnife(getCX() + Math.cos(a)*getR(), getCY() + Math.sin(a)*getR(), a + Math.PI/2);
  }
}

function drawWaiting() {
  if (phase !== 'playing' || flyingKnife) return;
  drawSingleKnife(getCX(), getKnifeY(), 0);
}

function drawFlying() {
  if (!flyingKnife) return;
  flyingKnife.y -= canvas.height * 0.022;
  if (flyingKnife.y < getCY() + getR() + getKL()) {
    checkHit(); return;
  }
  drawSingleKnife(flyingKnife.x, flyingKnife.y, 0);
}

function checkHit() {
  if (!flyingKnife) return;
  var kx = flyingKnife.x, ky = flyingKnife.y;
  var dist = Math.sqrt((kx-getCX())*(kx-getCX()) + (ky-getCY())*(ky-getCY()));
  if (dist <= getR() + getKL()) {
    var hitAngle = Math.atan2(ky - getCY(), kx - getCX());
    for (var i = 0; i < stuckKnives.length; i++) {
      var diff = Math.abs(((hitAngle - (stuckKnives[i].logAngle + angle)) % (Math.PI*2) + Math.PI*2) % (Math.PI*2));
      if (Math.min(diff, Math.PI*2 - diff) < 0.30) {
        flyingKnife = null; phase = 'fail';
        document.getElementById('msg').textContent = 'Game Over! Score: ' + score;
        document.getElementById('restart-btn').style.display = 'inline-block';
        return;
      }
    }
    stuckKnives.push({ logAngle: hitAngle - angle });
    flyingKnife = null;
    score += 10 * level; knivesLeft--;
    updateUI();
    if (knivesLeft <= 0) {
      phase = 'win';
      document.getElementById('msg').textContent = 'Level ' + (level+1) + ' unlocked!';
      setTimeout(function() { level++; initLevel(); }, 900);
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  var bg = ctx.createRadialGradient(getCX(), getCY(), 0, getCX(), getCY(), canvas.width*0.8);
  bg.addColorStop(0, '#1a1a2e'); bg.addColorStop(1, '#0d0d0d');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.save(); ctx.translate(getCX(), getCY()); ctx.rotate(angle); ctx.translate(-getCX(), -getCY());
  drawLog(); drawStuck();
  ctx.restore();
  drawFlying(); drawWaiting();
}

function throwKnife() {
  if (phase !== 'playing' || flyingKnife) return;
  flyingKnife = { x: getCX(), y: getKnifeY() };
}

document.addEventListener('click', function(e) {
  if (e.target.id === 'restart-btn') return;
  throwKnife();
});
document.addEventListener('touchstart', function(e) {
  if (e.target.id === 'restart-btn') return;
  e.preventDefault(); throwKnife();
}, { passive: false });
document.getElementById('restart-btn').addEventListener('click', function(e) {
  e.stopPropagation(); score = 0; level = 1; initLevel();
});

function loop() {
  if (phase === 'playing') angle += speed;
  draw(); requestAnimationFrame(loop);
}
initLevel(); loop();
</script>
</body>
</html>
